      description: We are monitoring the situation and continue to work toward restoring capacity in the dxb1 region. We will send further updates when new information is available.
    - ts: "2026-03-16 18:44:04"
      description: Due to ongoing issues in the dxb1 region, traffic and regional Vercel services are currently re-routed to bom1. We will share more details on recovery when they become available.
