      description: 'We have identified and resolved an issue which resulted in issues with model responses when making use of structured outputs via the Anthropic API between 16:10 UTC on April 22 and 01:59 UTC on April 23. During this period, structured outputs containing some forms of grammar requirements returned with reduced quality. This did not impact any requests not using structured outputs, as detailed here: https://platform.claude.com/docs/en/build-with-claude/structured-outputs.'
      resolved: true
