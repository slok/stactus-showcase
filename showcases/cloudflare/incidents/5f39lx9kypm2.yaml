version: incident/v1
id: 5f39lx9kypm2
name: 'Cloudflare Zero Trust: Gateway Issues'
impact: minor
systems: []
timeline:
    - ts: "2026-03-11 13:41:56"
      description: |-
        Cloudflare investigated and fixed an issue that impacted users trying to view or modify Zero Trust Gateway Policies. During the impacted period, API users would have received 500 status code responses to GET requests to the /accounts/{account_id}/gateway/rules endpoint, whilst Zero Trust Dashboard users would have been unable to view or edit Zero Trust Gateway Policies in the "Firewall policies", "Egress policies" or "Resolver policies" pages would all have displayed the error "We ran into an error while fetching our data".

        This may have impacted customers on Mon 9th March, 2026 from 17:45 UTC to 18:02 UTC.
      resolved: true
