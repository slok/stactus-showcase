version: incident/v1
id: vjrk8c8w37lz
name: Resolution Issues for .de Domains
impact: minor
systems:
    - 8w536gxk7dvq
timeline:
    - ts: "2026-05-05 21:17:17"
      description: We are observing issues with authoritative resolution for the .de TLD.
      investigating: true
    - ts: "2026-05-05 21:20:40"
      description: The issue has been identified and a fix is being implemented.
    - ts: "2026-05-05 22:01:04"
      description: |-
        The issue has been identified as a DNSSEC signing problem at DENIC, the organization responsible for the .DE top-level domain. Cloudflare is temporarily disabling DNSSEC validation for .de domains on 1.1.1.1 resolver (as per RFC 7646) in order to allow .DE names to continue to resolve. DNSSEC validation will be re-enabled when the signing problems at DENIC are known to have been resolved.

        See RFC 7646 for more details:
        https://datatracker.ietf.org/doc/html/rfc7646
    - ts: "2026-05-05 22:07:37"
      description: We are continuing to work on a fix for this issue.
    - ts: "2026-05-05 22:14:42"
