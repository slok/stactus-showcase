    - ts: "2026-03-02 10:04:23"
      description: Customers are recommended to configure a new blank stack in an alternative Grafana Cloud region and to reconfigure their clients (such as Grafana Alloy) to send telemetry to that region, Fleet Management can be used for this purpose https://grafana.com/docs/grafana-cloud/send-data/fleet-management/introduction/
      investigating: true
    - ts: "2026-03-02 10:31:13"
      description: "AWS are recommending that affected customers move workloads to alternate regions https://health.aws.amazon.com/health/status and we are recommending the same.\n\nCustomers who are impacted and who cannot wait for a restoration of service are asked to:\n1. Create a Grafana Cloud stack in an alternate region \n2. Update clients to send telemetry to the new region, if using Grafana Alloy then you can use Fleet Management https://grafana.com/docs/grafana-cloud/send-data/fleet-management/introduction/\n3. If your instance remains available and you have not configured your dashboards as code, then you may be able to use `grafanactl` to migrate dashboards https://grafana.com/docs/grafana/latest/as-code/observability-as-code/grafana-cli/grafanacli-workflows/ https://grafana.github.io/grafanactl/ \n\nWe will provide updates when we have them, but we do not have an expected resolution time at this point."
      investigating: true
    - ts: "2026-03-02 22:18:17"
      description: "Please continue to refer to the AWS status page for more detailed updates specific to AWS.\nhttps://health.aws.amazon.com/health/status\n\nAWS are recommending that affected customers move workloads to alternate regions, and we are recommending the same.\n\nCustomers who are impacted and who cannot wait for a restoration of service are asked to:\n1. Create a Grafana Cloud stack in an alternate region \n2. Update clients to send telemetry to the new region, if using Grafana Alloy then you can use Fleet Management https://grafana.com/docs/grafana-cloud/send-data/fleet-management/introduction/\n3. If your instance remains available and you have not configured your dashboards as code, then you may be able to use `grafanactl` to migrate dashboards https://grafana.com/docs/grafana/latest/as-code/observability-as-code/grafana-cli/grafanacli-workflows/ https://grafana.github.io/grafanactl/ \n\nWe are continuing to work with our CSP at this time, and will provide updates as they are available."
