timeline:
    - ts: "2026-07-16 09:05:47"
      description: |-
        We are investigating elevated 5xx errors that may impact all UI Cloud services, including web portals, APIs, authentication, and cloud-managed applications.

        The issue appears to be related to an ongoing AWS CloudFront incident affecting customers using CloudFront VPC Origins. We are actively monitoring the situation, assessing the impact across our platform, and working with AWS as they investigate.

        We will provide updates as more information becomes available.
      investigating: true
    - ts: "2026-07-16 11:32:13"
      description: |-
        The elevated 5xx errors affecting UI Cloud services have been resolved, and service has returned to normal operation.

        We will share additional information if further action or follow-up is required.
      resolved: true
