    - ts: "2026-05-20 17:46:07"
      description: A subset of runners are taking longer than expected to connect, which may delay some jobs from beginning execution. We are actively working to mitigate the issue.
      investigating: true
    - ts: "2026-05-20 17:52:28"
      description: The degradation affecting Actions has been mitigated. We are monitoring to ensure stability.
    - ts: "2026-05-20 18:17:16"
      description: We've applied a mitigation to fix the issues with queuing and running Actions jobs. We are seeing improvements in telemetry and are monitoring for full recovery.
    - ts: "2026-05-20 19:41:53"
      description: Customer impact has fully subsided. We are maintaining yellow status while we deploy a permanent fix to prevent recurrence.
    - ts: "2026-05-20 20:14:16"
      description: On May 20, 2026, between 16:00 UTC and 17:45 UTC, GitHub Actions customers experienced run start delays exceeding 5 minutes. Approximately 4.5% of all runs were delayed during the impact window, with scale set jobs disproportionately affected. 30% of scale set jobs were delayed and 4% failed to start entirely. <br /><br />The incident was caused by a misconfigured health check on an internal service that assigns jobs to runners. A brief latency spike in an upstream dependency triggered health check failures across several pods, removing them from service and concentrating load on the remaining capacity. The added load drove memory pressure that escalated into a cascading failure in one regional cluster, leaving it unable to self-recover. <br /><br />Responders mitigated the incident by scaling capacity in the healthy regional clusters and draining traffic away from the impaired one, after which run start latency recovered. To prevent recurrence, we are strengthening our health check configuration to avoid cascading failure scenarios and evaluating automated mitigations to rebalance traffic when a region is degraded.
      resolved: true
