timeline:
    - ts: "2026-04-28 14:17:34"
      description: We are investigating reports of degraded performance for Pull Requests
      investigating: true
    - ts: "2026-04-28 14:51:17"
      description: After yesterday’s incident, we are investigating cases where /pulls and /repo/pulls pages are not showing all indexed pull requests. This is because our Elasticsearch cluster does not currently contain all indexed documents.<br /><br />No pull request data has been lost. As pull requests are updated, they will be reindexed. We are also working on accelerating a full reindex so these pages return complete results again.
      investigating: true
    - ts: "2026-04-28 15:58:40"
      description: We are actively reindexing the remaining ElasticSearch indexes. Our priority is ensuring correctness and avoiding further impact.  We are taking a measured approach to safely backfill data and will share additional updates as progress continues.
      investigating: true
    - ts: "2026-04-28 21:43:17"
      description: Elastic search reindexing of pull requests is continuing. All data is preserved, but may not be available on pages relying on elasticsearch until the reindex is complete.<br /><br />Pages and APIs that do not rely on elasticsearch, including the GitHub CLI (gh pr list) and API (/repos/{owner}/{repo}/pulls), are not impacted and can be used to retrieve pull request data in the interim.
      investigating: true
    - ts: "2026-04-28 22:46:59"
      description: We have made an interim mitigation to improve availability for some impacted repositories while reindexing continues, and we are actively monitoring the indexing progress.
      investigating: true
    - ts: "2026-04-29 00:40:41"
      description: Mitigation is in progress, with full recovery of impacted pull request listings expected within approximately 24 hours.
      investigating: true
    - ts: "2026-04-29 22:22:22"
      description: We have restored search/indexing functionality for over 99% of impacted pull requests. We are continuing to address the remaining affected pull requests and are reviewing outstanding gaps as part of the restoration process.
      investigating: true
