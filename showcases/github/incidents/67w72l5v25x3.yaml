timeline:
    - ts: "2026-06-15 15:37:36"
      description: We are investigating reports of degraded performance for Webhooks
      investigating: true
    - ts: "2026-06-15 16:39:34"
      description: Webhooks delivery latency has returned to normal levels. The backlog that built up during the incident has been cleared at approximately 4:29 UTC. We consider this incident resolved.
      investigating: true
    - ts: "2026-06-15 16:39:52"
      description: The degradation affecting Webhooks has been mitigated. We are monitoring to ensure stability.
    - ts: "2026-06-15 17:37:39"
      description: On June 15, 2026, between 15:27 UTC and 16:23 UTC, GitHub webhook deliveries were delayed. During this window, webhook events were delivered later than normal, with average end-to-end delivery latency peaking at approximately 8.8 minutes. No webhook deliveries were lost — delayed events were queued and delivered once processing recovered.<br /><br />This was caused by a temporary throughput constraint in an internal event-processing system that moves webhook events through GitHub's delivery pipeline. The rate at which events were processed for delivery dropped below the incoming volume, creating a backlog. We restarted the affected pipeline service, after which throughput recovered and the backlog fully drained by approximately 16:29 UTC. Webhook delivery latency returned to normal, the incident was mitigated at 16:39 UTC, and fully resolved at 17:37 UTC.<br /><br />To reduce the likelihood and impact of similar incidents, we are working on improving the accuracy of the utilization metrics used to scale our delivery worker pools, reviewing connection and capacity headroom in the delivery pipeline.
      resolved: true
