version: incident/v1
id: d9b4dsg8d0r6
name: Multiple services have elevated errors and endpoint failures when checking feature flags
impact: minor
systems: []
timeline:
    - ts: "2026-06-15 18:32:03"
      description: We are investigating reports of impacted performance for some GitHub services.
      investigating: true
    - ts: "2026-06-15 19:02:13"
      description: The degradation has been mitigated. We are monitoring to ensure stability.
    - ts: "2026-06-15 19:10:07"
      description: We identified an issue with feature flag checks that caused elevated errors and endpoint failures across multiple GitHub Copilot services. Customers may have experienced failed requests or degraded functionality. A fix has been deployed and error rates are steadily decreasing. All affected services are now mitigated and we are monitoring recovery.
    - ts: "2026-06-15 19:10:15"
      description: Between 17:38 UTC and 18:22 UTC on June 15, 2026, approximately 83% of requests to the analytics endpoint serving the /chronicle feature failed.  The cause was an internal feature-flag service that encountered a transient error and failed to recover, causing feature flag checks to fail. The analytics endpoint was gated behind one of these flags, resulting in requests being rejected. We restored service health by removing the feature flag gating the analytics endpoint and deploying that change. To avoid recurrence of similar incidents, we have changed the feature-flag client so that errors that are not known to be permanent are retried, and we are improving alerting and startup behavior so this class of failure is detected and recovered from faster.
      resolved: true
