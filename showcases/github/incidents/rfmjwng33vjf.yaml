name: Incident with Copilot Availability
impact: critical
systems:
    - pjmpxvq2cmr2
timeline:
    - ts: "2026-06-17 03:50:23"
      description: We are investigating reports of degraded availability for Copilot
      investigating: true
    - ts: "2026-06-17 03:52:07"
      description: We are experiencing degraded availability for chat & agent models in Copilot. Multiple models are impacted and customers may experience requests failing. We are investigating and will provide an update as soon as possible.
      investigating: true
    - ts: "2026-06-17 04:26:20"
      description: We've applied a mitigation to unblock Copilot functionality. Users may start to see signs of recovery. Relaunching your client should accelerate signs of recovery. We will continue to monitor the situation.
      investigating: true
    - ts: "2026-06-17 04:44:06"
      description: Copilot is operating normally.
    - ts: "2026-06-17 04:44:07"
      description: On June 17, 2026, between approximately 03:35 UTC and 04:44 UTC, GitHub Copilot was degraded and most of its frontier chat models were temporarily unavailable across all regions. During this window, affected models either disappeared from the model picker in the web, editor, and CLI experiences, or returned a "model not available" error when selected. Customers could continue using GitHub Copilot by selecting one of the models that remained available. The incident occurred during off-peak hours, which limited the number of customers affected.<br /><br />This was due to a configuration change that our production system deemed invalid. We mitigated the incident by reverting the configuration change, after which the affected models returned automatically as the service reloaded the previous configuration.<br /><br />We are working to roll out configuration changes gradually with stronger validations, alerts on sudden drops in the number of available models, and automatically rolls back configuration changes that produce these alerts.
      resolved: true
