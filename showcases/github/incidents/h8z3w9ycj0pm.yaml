timeline:
    - ts: "2026-02-23 14:56:09"
      description: We are investigating reports of degraded performance for Copilot
      investigating: true
    - ts: "2026-02-23 14:56:37"
      description: We are experiencing degraded availability for the Haiku 4.5 model in Copilot Chat, VS Code and other Copilot products. This is due to an issue with an upstream model provider. We are working with them to resolve the issue.<br /><br />Other models are available and working as expected.
      investigating: true
    - ts: "2026-02-23 15:13:14"
      description: Our provider has recovered and we are not seeing errors but we are awaiting a signal from them that the issue will not regress before we go green.
      investigating: true
    - ts: "2026-02-23 15:59:39"
      description: The issues with our upstream model provider have been resolved, and Haiku 4.5 is once again available in Copilot Chat and across IDE integrations.<br /><br />We will continue monitoring to ensure stability, but mitigation is complete.
      investigating: true
    - ts: "2026-02-23 15:59:59"
      description: Copilot is operating normally.
      investigating: true
    - ts: "2026-02-23 16:19:33"
      description: On February 23, 2026, between 14:45 UTC and 16:19 UTC, the Copilot service was degraded for Claude Haiku 4.5 model. On average, 6% of the requests to this model failed due to an issue with an upstream provider. During this period, automated model degradation notifications directed affected users to alternative models. No other models were impacted. The upstream provider identified and resolved the issue on their end. <br />We are working to improve automatic model failover mechanisms to reduce our time to mitigation of issues like this one in the future.
      resolved: true
