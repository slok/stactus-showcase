timeline:
    - ts: "2026-05-05 16:49:36"
      description: We are investigating reports of impacted performance for some GitHub services.
      investigating: true
    - ts: "2026-05-05 16:54:25"
      description: Between approximately 14:00 and 16:10 UTC, customers using SSH-based Git operations may have experienced elevated latency and failures. HTTP-based operations were not impacted. We've identified a suspected root cause and are working to implement a mitigation to prevent further impact.
    - ts: "2026-05-05 17:23:59"
      description: Git Operations is experiencing degraded performance. We are continuing to investigate.
      investigating: true
    - ts: "2026-05-05 17:26:03"
      description: We're continuing to work on preventing further impact from the earlier issue. No SSH-based impact is expected at this time. We'll post new updates if impact recurs or once our mitigation is in place.
      investigating: true
    - ts: "2026-05-05 18:25:36"
      description: The degradation affecting Git Operations has been mitigated. We are monitoring to ensure stability.
    - ts: "2026-05-05 18:35:36"
      description: We've completed our mitigation to prevent further impact. At this time the incident is considered resolved.
    - ts: "2026-05-05 18:35:41"
      description: Between approximately 14:00 and 16:10 UTC on May 5, 2026, SSH-based Git operations experienced elevated latency and intermittent failures. On average, the error rate was 0.46% and peaked at 0.6% of SSH write requests. HTTP-based Git operations, including web UI and HTTPS clones, were not affected. <br /><br />The impact was caused by reduced SSH capacity at one of our data center sites. During a period of high traffic, the remaining hosts became overloaded, leading to connection exhaustion and some failures for SSH-based operations. <br /><br />Additional capacity was provisioned to expand SSH capacity and resolve the incident. The expanded capacity was fully online by 18:18 UTC. <br /><br />To reduce the likelihood of similar incidents, we will implement faster scaling solutions for SSH infrastructure and improved alerting for host availability and capacity thresholds.
      resolved: true
