timeline:
    - ts: "2026-03-12 13:06:55"
      description: We are investigating reports of degraded performance for Codespaces
      investigating: true
    - ts: "2026-03-12 13:07:45"
      description: We're investigating an issue where extensions fail to install in newly created Codespaces. Users can still create and access Codespaces, but extensions will not be operational, resulting in a degraded development experience. Our team is actively working to identify and resolve the root cause. We'll post another update by 14:00 UTC.
      investigating: true
    - ts: "2026-03-12 13:50:06"
      description: We are continuing to investigate an issue where extensions fail to install in newly created Codespaces. Users can create and access Codespaces, but extensions will not be operational, resulting in a degraded experience. The team is working on a fix. All newly created Codespaces are affected. We'll post another update by 15:00 UTC.
      investigating: true
    - ts: "2026-03-12 14:29:31"
      description: We have deployed a fix for the issue affecting extension installation in newly created Codespaces. New Codespaces are now being created with working extensions. We'll post another update by 15:30 UTC.
      investigating: true
    - ts: "2026-03-12 15:08:15"
      description: We're seeing partial recovery for the issue affecting extension installation in newly created Codespaces. Some users may still experience degraded functionality where extensions hit errors. The team continues to investigate the root cause while monitoring the recovery.
      investigating: true
    - ts: "2026-03-12 16:09:52"
      description: We're seeing intermittent failures downloading from the extension marketplace from codespaces and are investigating.
      investigating: true
    - ts: "2026-03-12 17:20:20"
      description: We're seeing intermittent failures downloading from the extension marketplace from codespaces, caused by IP blocks for some codespaces. We're working to remove those blocks.
      investigating: true
    - ts: "2026-03-12 17:59:56"
      description: Codespaces IPs are no longer being blocked from Visual Studio Marketplace operations and we are monitoring for full recovery
      investigating: true
    - ts: "2026-03-12 18:53:33"
      description: On March 12, 2026, between 01:00 UTC and 18:53 UTC, users saw failures downloading extensions within created or resumed codespaces. Users would see an error when attempting to use an extension within VS Code. Active codespaces with extensions already downloaded were not impacted.<br /><br />The extensions download failures were the result of a change introduced in our extension dependency and was resolved by updating the configuration of how those changes affect requests from Codespaces. We are enhancing observability and alerting of critical issues within regular codespace operations to better detect and mitigate similar issues in the future.
      resolved: true
