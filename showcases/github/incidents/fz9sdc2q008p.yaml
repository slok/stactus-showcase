    - ts: "2026-07-07 15:06:56"
      description: Customers accessing Actions runners and Codespaces REST APIs continue to see 500 errors a percentage of the time. Retries may be successful.<br /><br />We continue to investigate the source of these errors.
      investigating: true
    - ts: "2026-07-07 15:50:02"
      description: Customers will continue to see 500 errors for approximately 8% of Actions runner REST APIs and 13% of Codespaces REST APIs. Retries may be successful. We have identified a likely cause and are preparing a mitigation.
      investigating: true
    - ts: "2026-07-07 16:00:01"
      description: We have rolled out the mitigation and are seeing recovery.
      investigating: true
    - ts: "2026-07-07 16:02:02"
      description: The degradation affecting Actions and Codespaces has been mitigated. We are monitoring to ensure stability.
    - ts: "2026-07-07 16:17:16"
      description: On July 7, 2026, between 14:01 UTC and 16:17 UTC the Actions and Codespaces REST APIs were degraded and returned intermittent 500-class errors for a percentage of requests. Error rates peaked at approximately 8% of Actions runner API requests and 13% of Codespaces API requests, though retries were frequently successful. In-progress Actions runs and Codespaces were not impacted and continued successfully. This was due to a recent change that did not deliver the expected performance and, under certain conditions, caused downstream errors.<br /><br />We mitigated the incident by rolling back the change, after which the affected services recovered.<br /><br />We are working to improve the resilience of our services to these conditions and to strengthen our monitoring to reduce our time to detection and mitigation of issues like this one in the future.
      resolved: true
