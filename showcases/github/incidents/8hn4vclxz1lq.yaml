version: incident/v1
id: 8hn4vclxz1lq
name: Problems with third-party Claude and Codex Agent sessions not being listed in the agents tab dashboard
impact: minor
systems: []
timeline:
    - ts: "2026-04-10 13:07:21"
      description: We are investigating reports of impacted performance for some GitHub services.
      investigating: true
    - ts: "2026-04-10 13:08:00"
      description: We are investigating third party Claude and Codex Cloud Agent sessions not being listed in the agents tab dashboard.
      investigating: true
    - ts: "2026-04-10 13:28:23"
      description: On April 9, 2026, between 22:59 UTC and April 10, 2026, 13:24 UTC, the Copilot Mission Control service was degraded and did not display Claude and Codex Cloud Agent sessions in the agents tab dashboard. Customers were unable to see, list, or manage their third party agent sessions during this period. The underlying agent sessions continued to function normally. This was a visibility and management issue only, and no HTTP errors were generated. The API returned successful responses with incomplete results, with an average error rate of 0% and a maximum error rate of 0%. This was due to a code change that introduced a filter which inadvertently excluded third party agent sessions.<br /><br />We mitigated the incident by reverting the problematic code change and deploying the fix to production.<br /><br />We are working to add automated monitoring for dashboard content visibility and improve integration test coverage for third party agent session listing to reduce our time to detection and mitigation of issues like this one in the future.
      resolved: true
