version: incident/v1
id: xs2p9z3b73r3
name: Disruption with GitHub's code search
impact: major
systems: []
timeline:
    - ts: "2026-04-01 15:02:54"
      description: We are investigating reports of impacted performance for some GitHub services.
      investigating: true
    - ts: "2026-04-01 16:00:31"
      description: We identified an issue in our ingestion pipeline that degraded the freshness of Code Search results. While fixing the issue with the ingestion pipeline, a deployment caused a loss of dynamic configuration which is causing most requests for Code Search results to fail. We are working to restore the service and to re-ingest the misaligned data.
      investigating: true
    - ts: "2026-04-01 17:48:15"
      description: We are observing some recovery for Code Search queries, but customers should be aware that the data being served may be stale, especially for changes that took place after 07:00 UTC today (1 April 2026). We are still working on recovering our ingestion pipeline, and synchronizing the indexed data.<br /><br />We will update again within 2 hours.
      investigating: true
    - ts: "2026-04-01 19:37:57"
      description: We are still working on recovering back to a serviceable state and expect to have a more substantial update within another two hours.
      investigating: true
    - ts: "2026-04-01 22:00:46"
      description: We have stabilized Code Search infrastructure, and are in the final stages of validation before slowly reintroducing production traffic.
      investigating: true
