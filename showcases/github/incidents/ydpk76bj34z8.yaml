timeline:
    - ts: "2026-07-14 17:38:28"
      description: We are investigating reports of degraded performance for Webhooks
      investigating: true
    - ts: "2026-07-14 17:55:45"
      description: Between 15:17 and 15:27 UTC, an ongoing deployment had an unintended side effect where webhook delivery states were not persisted in all cases, even when deliveries were accepted and processed. Customers may notice missing webhook deliveries in the UI, and these deliveries will not be retryable.<br /><br />Impact resolved automatically once the deployment completed.
      investigating: true
    - ts: "2026-07-14 17:55:50"
      description: The degradation affecting Webhooks has been mitigated. We are monitoring to ensure stability.
    - ts: "2026-07-14 18:01:57"
      description: 'On July 14, 2026, between 15:17 and 15:37 UTC, a rollout to GitHub''s internal webhook delivery pipeline caused a subset of webhook delivery records to not be written to our webhook deliveries store after being processed and delivered successfully. Affected deliveries would be missing from the webhook delivery UI and API and won’t be available for redelivery. <br /><br />The root cause was an uncoordinated rollout: a change to how delivery records are handed off between pipeline components was deployed before the upstream components producing those records were updated to match. While the rollout was in progress, affected records were silently skipped rather than persisted, with no automatic retry. The impact ended as soon as the rollout was completed. <br /><br />About 2.4M delivery records were skipped (approximately 4% of the 20-minute impact window, 0.04% of a typical 24-hour period). Importantly, 95% of these deliveries reached customer endpoints successfully, only the record of the delivery is missing. Of the ~5% that failed to reach customer endpoints, only ~1.4% (5,463) map to webhooks that retried their deliveries in the past 28 days. <br /><br />To prevent recurrence, we are making delivery persistence safe-by-default, adding alert on drops in the persisted-delivery rate, and tightening rollout coordination for changes that span multiple components in the pipeline.'
      resolved: true
