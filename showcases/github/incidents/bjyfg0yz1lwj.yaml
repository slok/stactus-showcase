timeline:
    - ts: "2026-04-16 15:06:56"
      description: We are investigating reports of degraded performance for Codespaces
      investigating: true
    - ts: "2026-04-16 15:08:26"
      description: We are experiencing degraded performance in Codespaces related to creating a new Codespace or starting an existing Codespace from the VS Code editor. SSH connections to Codespaces are not impacted. We are working toward mitigation and will continue to keep you updated on progress.
      investigating: true
    - ts: "2026-04-16 15:41:45"
      description: Codespaces is experiencing degraded availability. We are continuing to investigate.
      investigating: true
    - ts: "2026-04-16 15:49:13"
      description: We found an issue that impacts 70% of Codespaces. We are engaged with the provider and working towards mitigation.
      investigating: true
    - ts: "2026-04-16 16:37:28"
      description: Our provider is implementing a mitigation and we are seeing signs of recovery.
      investigating: true
    - ts: "2026-04-16 18:22:24"
      description: The degradation affecting Codespaces has been mitigated. We are monitoring to ensure stability.
    - ts: "2026-04-16 18:28:07"
      description: On April 16, 2026 between 09:30 UTC and 17:15 UTC, users experienced failures when attempting to connect to GitHub Codespaces via the VS Code editor. During this time, approximately 40% of codespace start operations failed. Users connecting via SSH were not impacted.  <br /><br />The issue was caused by a failure in an upstream download service that prevented the VS Code Server from being retrieved during codespace startup.  The impact was mitigated by implementing a workaround to use an alternative download path when the primary endpoint is degraded.  <br /><br />We are working with the upstream dependency to address the root cause of the download service failure, and we are improving our fallback mechanisms to reduce the impact of similar upstream failures in the future.
      resolved: true
