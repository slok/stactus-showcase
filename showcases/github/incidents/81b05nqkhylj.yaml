name: Incident with high errors on Git Operations
impact: minor
systems:
    - 8l4ygp009s5s
timeline:
    - ts: "2026-05-11 14:25:30"
      description: We are investigating reports of degraded performance for Git Operations
      investigating: true
    - ts: "2026-05-11 14:33:52"
      description: On May 11th, 2026, between 14:00 UTC and 14:33 UTC, HTTP-based Git read operations were degraded. On average, the error rate was 2.8% and peaked at 7.5% of requests to the service. This was due to resource exhaustion in a networking gateway between GitHub.com’s frontend service for Git operations and a dependency service that performs authentication and authorization. Following the initial spike, the frontend service became stuck in a degraded state in one of our data centers, increasing time to mitigation. <br /><br />We mitigated the incident by scaling the networking gateway and re-deploying the frontend service. <br /><br />To reduce our time to detection and mitigation in the future, we are adding auto-scaling to the networking gateway, and resolving a bug which caused the frontend service to remain degraded.
      resolved: true
