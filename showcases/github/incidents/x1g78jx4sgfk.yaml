    - ts: "2026-03-18 18:51:00"
      description: We are investigating reports of degraded performance for Webhooks
      investigating: true
    - ts: "2026-03-18 19:25:06"
      description: We are seeing recovery and are continuing to monitor the latency for webhook deliveries
      investigating: true
    - ts: "2026-03-18 19:46:38"
      description: On March 18, 2026, between 18:18 UTC and 19:46 UTC all webhook deliveries experienced elevated latency. During this time, average delivery latency increased from a baseline of approximately 5 seconds to a peak of approximately 160 seconds. This was due to resource constraints in the webhook delivery pipeline, which caused queue backlog growth and increased delivery latency. We mitigated the incident by shifting traffic and adding capacity, after which webhook delivery latency returned to normal. We are working to improve capacity management and detection in the webhook delivery pipeline to help prevent similar issues in the future.
      resolved: true
