name: Disruption with projects service
impact: minor
systems: []
timeline:
    - ts: "2026-04-21 15:03:21"
      description: We are investigating reports of impacted performance for some GitHub services.
      investigating: true
    - ts: "2026-04-21 15:07:30"
      description: We are investigating reports of delays with GitHub Projects. Users may notice that changes made to projects are not reflected immediately. Our team has identified the source of the delays and is actively working to resolve the issue.
      investigating: true
    - ts: "2026-04-21 15:42:20"
      description: We continue to investigate delays with GitHub Projects where changes may not be reflected immediately. Our team has identified the cause and applied mitigations to address the issue. We are seeing initial signs of recovery, though some delays may persist as the system works through a backlog of pending updates.
      investigating: true
    - ts: "2026-04-21 16:18:24"
      description: We are deploying a fix to relieve the queue of delayed data. Some users may still experience delays with GitHub Projects where changes are not reflected immediately as remaining backlogs are processed.
      investigating: true
    - ts: "2026-04-21 16:45:22"
      description: The mitigation is deployed and we are seeing recorvery in the queues and will provide an update as to when full recovery will be realized.
      investigating: true
    - ts: "2026-04-21 17:21:33"
      description: The queues are continuing to decrease and we are working to accelerate the rate of processing through the queues.
      investigating: true
    - ts: "2026-04-21 19:41:18"
      description: Recovery from the delays affecting GitHub Projects continues to progress. We have deployed additional mitigations that are accelerating processing of the backlog. Users may still experience delays where changes to projects are not reflected immediately. We expect full recovery within approximately six hours.
      investigating: true
    - ts: "2026-04-21 21:15:06"
      description: The degradation has been mitigated. We are monitoring to ensure stability.
    - ts: "2026-04-21 22:49:52"
      description: The issue remains mitigated. Users may still experience delays in changes to projects while we process the backlog of events. We expect a full recovery in approximately three hours.
    - ts: "2026-04-22 00:00:49"
      description: The issue remains mitigated. Users may still experience small delays in changes to projects while we process the backlog of events. We expect a full recovery in approximately two hours.
    - ts: "2026-04-22 01:24:13"
      description: On April 21, 2026, between 13:35 UTC and 01:24 UTC the following day the projects service was degraded. During this time period, projects may have been out of sync and users may have experienced delays in changes to projects and their items. Delays in reflected changes peaked at approximately 45 minutes. The delays were caused by serialization errors that failed events and triggered a flood of resyncs, overloading our event processing layers.<br /><br />We mitigated the incident by speeding up processing time for incoming changes and otherwise waiting for all changes to be processed.<br /><br />We are working to increase our capacity for processing updates to projects to reduce our time to mitigation of issues like this one in the future.
      resolved: true
