name: Incident with CodeQL
impact: minor
systems: []
timeline:
    - ts: "2026-05-13 14:41:28"
      description: We are investigating reports of impacted performance for some GitHub services.
      investigating: true
    - ts: "2026-05-13 14:43:50"
      description: We are investigating delays affecting CodeQL, the code analysis engine used by Code Scanning. Some users may experience delayed or incomplete code scanning results. Our engineering team is investigating. We will provide another update by 15:15 UTC.
      investigating: true
    - ts: "2026-05-13 14:58:50"
      description: We have applied a mitigation to increase processing capacity. We are continuing to monitor to confirm full recovery. We will provide another update by 15:30 UTC.
      investigating: true
    - ts: "2026-05-13 15:26:42"
      description: The degradation has been mitigated. We are monitoring to ensure stability.
    - ts: "2026-05-13 15:30:52"
      description: CodeQL impact has been mitigated. We are continuing to monitor for durable recovery.
    - ts: "2026-05-13 16:03:53"
      description: On May 13, 2026, between 14:31 and 16:03 UTC, the Code Scanning service experienced processing delays and 12% of check runs took over 15 minutes to complete. The delays were caused by replication lag due to an internal database migration, resulting in insufficient worker capacity for our high rate of job enqueues. <br /><br />We mitigated the impact by scaling our processing workers by 34%. Code Scanning results returned to normal processing times after the mitigation was applied.  <br /><br />The capacity increases are permanent, and we are looking into more ways to decrease the load on our workers to help prevent this in the future.
      resolved: true
