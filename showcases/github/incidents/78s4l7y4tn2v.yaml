timeline:
    - ts: "2026-03-11 14:25:17"
      description: We are investigating reports of impacted performance for some GitHub services.
      investigating: true
    - ts: "2026-03-11 14:28:04"
      description: We are investigating degraded performance with Copilot Code Review. Customers may experience extended review times or occasional failures. We are seeing signs of improvement as our team works to restore normal service. We'll post another update by 15:30 UTC.
    - ts: "2026-03-11 15:31:21"
      description: We experienced degraded performance with Copilot Code Review starting at 14:01 UTC. Customers experienced extended review times and occasional failures. Some extended processing times may continue briefly. We are monitoring for full recovery. We'll post another update by 16:30 UTC.
    - ts: "2026-03-11 15:53:07"
      description: Copilot Code Review queue processing has returned to normal levels.
    - ts: "2026-03-11 15:53:15"
      description: On March 11, 2026, between 13:00 UTC and 15:23 UTC the Copilot Code Review service was degraded and experienced longer than average review times. On average, Copilot Code Review requests took 4 minutes and peaked at just under 8 minutes. This was due to hitting worker capacity limits and CPU throttling. We mitigated the incident by increasing partitions, and we are improving our resource monitoring to identify potential issues sooner.
      resolved: true
