timeline:
    - ts: "2026-04-22 19:53:49"
      description: We are investigating reports of impacted performance for some GitHub services.
      investigating: true
    - ts: "2026-04-22 19:55:47"
      description: Issues is experiencing degraded performance. We are continuing to investigate.
      investigating: true
    - ts: "2026-04-22 20:02:21"
      description: Copilot @-mentions on pull requests are currently not being processed by Copilot Cloud Agent. We have found the issue and are investigating remediations.
      investigating: true
    - ts: "2026-04-22 20:37:21"
      description: We have identified the root cause of the disruption affecting Copilot Coding Agent and Issues. Copilot @-mentions on pull requests are not being processed, and some issue-related functionality may be degraded. A fix has been developed and is being applied. <br />
      investigating: true
    - ts: "2026-04-22 22:09:08"
      description: We have identified the root cause of the disruption affecting Copilot Coding Agent and Issues. A fix is being deployed.
      investigating: true
    - ts: "2026-04-22 22:43:59"
      description: 'On April 22, 2026, between 09:00 UTC and 22:05 UTC, the Copilot coding agent and pull request comment event processing were degraded. During this period, approximately 0.5% of total pull request and issue comments mentioned @copilot (~23,000 invocations), explicitly requested work from the Copilot coding agent but were not acted upon.<br /><br />Creating, viewing, and replying to pull request comments was unaffected, and other Copilot<br />functionality continued to operate normally. The impact was limited to @copilot mentions on pull request comments not triggering Copilot coding agent runs, and to some downstream systems not receiving new pull request comment events during the impact window.<br /><br />The cause was a serialization error that prevented pull request comment events from being published to downstream consumers, including the Copilot coding agent. This was related to the same class of issue as incident #4295 on April 20, affecting a another event type.<br /><br />We mitigated the incident by deploying a fix that restored event publishing, after which the Copilot coding agent and other downstream consumers resumed processing pull request comment events normally.<br /><br />We are working to complete our audit of related event schemas, migrate remaining consumers to use<br />the updated identifier fields, and improve monitoring to detect drops in publishing on critical event topics, to reduce our time to detection and mitigation of issues like this one in the future.'
      resolved: true
