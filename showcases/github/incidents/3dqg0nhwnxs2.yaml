version: incident/v1
id: 3dqg0nhwnxs2
name: Delays with Actions Jobs for Larger Runners using VNet Injection in the East US region
impact: minor
systems: []
timeline:
    - ts: "2026-04-24 19:02:39"
      description: We are investigating reports of impacted performance for some GitHub services.
      investigating: true
    - ts: "2026-04-24 19:09:12"
      description: We are investigating reports of degraded performance for Larger Runners with vnet injection in East US and we are working with our service provider on mitigation.
      investigating: true
    - ts: "2026-04-24 19:14:51"
      description: This is related to the public impact, "Multiservice impact for Azure Workloads in East US" shared at https://azure.status.microsoft/
      investigating: true
    - ts: "2026-04-25 00:36:04"
      description: On April 24, 2026, from approximately 11:39 UTC to April 25, 2026 at 00:15 UTC, GitHub Actions experienced delays and timeouts for Larger Hosted Runner jobs using VNet injection in the East US region without a failover region configured. Standard and Self-hosted runners were not impacted. This was caused by backend failures in our compute provider’s provisioning, scaling, and update operations for VMs in the East US region and mitigated by a rollback across all affected Availability Zones. More detail is available at https://azure.status.microsoft/en-us/status/history/?trackingId=5GP8-W0G.<br /><br />We are working to improve the reliability of our annotations for jobs impacted by regional issues and are adding system log notifications as an additional customer communication channel alongside annotations.<br /><br />VNet Failover is also now in public preview, allowing customers to evacuate Larger Hosted Runners using VNet injection in cases like this.
      resolved: true
