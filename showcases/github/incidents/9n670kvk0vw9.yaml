name: We are seeing elevated errors with Next Edit Suggestions and Completions
impact: minor
systems: []
timeline:
    - ts: "2026-06-23 23:04:50"
      description: We are investigating reports of impacted performance for some GitHub services.
      investigating: true
    - ts: "2026-06-23 23:26:55"
      description: We have applied a rollback and are seeing recovery.
      investigating: true
    - ts: "2026-06-23 23:27:25"
      description: The degradation has been mitigated. We are monitoring to ensure stability.
    - ts: "2026-06-23 23:29:34"
      description: On June 23, 2026, between 22:45 and 23:29 UTC, GitHub Copilot Completions and Next Edit Suggestions were degraded for users in all regions. During this window, affected users may have seen failed or missing code completions and Next Edit Suggestions. On average about 25% of Completions and Next Edit Suggestions requests failed during the impact window, peaking at roughly 27%. The cause was a configuration change that prevented the Copilot service from obtaining the authentication tokens it needs to reach its model backends; this both failed requests directly and caused the service to temporarily remove backends from rotation. GitHub engineers detected the elevated error rate within minutes, declared an incident, and mitigated the issue at 23:22 UTC by redeploying the service with a known-good configuration, which restored normal operation. As a follow-up, the team disabled the affected authentication path to prevent a future deployment from re-introducing the problem, and is making the change rollout safer. We apologize for the disruption and are taking steps to reduce the likelihood of similar incidents.
      resolved: true
