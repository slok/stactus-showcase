      description: Twilio is aware that some Sender IDs used to send messages to Australia are being incorrectly overwritten as Unverified even though they are compliant with ACMA. Verify customers may see traffic incorrectly being sent using the TWVerify sender and a brandless template. We are working on identifying the impacted accounts and resolving the issue.
