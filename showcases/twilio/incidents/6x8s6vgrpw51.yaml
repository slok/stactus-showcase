timeline:
    - ts: "2026-07-06 18:36:44"
      description: Our monitoring systems have detected a potential issue with Edit and Resubmit Rejected A2p Campaigns via Console Ui. Our engineers have been alerted and are investigating. We will provide an update when we have more details.
      investigating: true
    - ts: "2026-07-06 19:32:08"
      description: We are aware of an issue affecting the Twilio Console A2P 10DLC campaign management functionality. Customers are unable to edit and resubmit rejected A2P campaigns due to a missing "Fix" button on the campaign management screen for campaign initially submitted without Privacy Policy and Terms & Condition field values, which leaves critical fields such as Campaign Description and Sample Messages locked as read-only. Our team is actively investigating the root cause. We expect to provide another update in 1 hour or as soon as more information becomes available.
      investigating: true
    - ts: "2026-07-06 20:14:34"
      description: We are aware of an issue affecting the Twilio Console A2P 10DLC campaign management functionality. Customers are unable to edit and resubmit rejected A2P campaigns due to a missing "Fix" button on the campaign management screen for campaign initially submitted without Privacy Policy and Terms & Condition field values using APIs, which leaves critical fields such as Campaign Description and Sample Messages locked as read-only. Customers can delete and resubmit such campaigns with Privacy Policy and Terms & Condition fields without incurring campaign fees for the failed submission. Our team is actively working on addressing the root cause. We expect to provide another update in 2 hours or as soon as more information becomes available.
    - ts: "2026-07-06 22:14:47"
      description: We are aware of an issue affecting the Twilio Console A2P 10DLC campaign management functionality. Customers are unable to edit and resubmit rejected A2P campaigns due to a missing "Fix" button on the campaign management screen for campaign initially submitted without Privacy Policy and Terms & Condition field values using APIs, which leaves critical fields such as Campaign Description and Sample Messages locked as read-only. Customers can delete and resubmit such campaigns with Privacy Policy and Terms & Condition fields without incurring campaign fees for the failed submission. Our team is actively working on addressing the root cause. We expect to provide another update in 4 hours or as soon as more information becomes available.
    - ts: "2026-07-06 23:29:11"
      description: We have identified and mitigated the issue impacting edit capability of failed campaign registrations without Privacy Policy and Terms & Condition fields. We are working on resolving all existing impacted customers. We expect to provide another update in 30 minutes or as soon as more information becomes available.
    - ts: "2026-07-06 23:59:21"
