      description: Twilio customers may be experiencing SMS delivery receipt delays from Twilio to Robi network subscribers in Bangladesh. Our team has identified the cause, and is working to resolve the issue. Message delivery may succeed, but delivery receipts may be delayed. We will provide another update in 1 hour or as soon as more information becomes available.
