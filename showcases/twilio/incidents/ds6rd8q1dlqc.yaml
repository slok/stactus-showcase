      description: Twilio customers may be experiencing SMS delivery receipt delays from Twilio to Robi/Axoata network subscribers in Bangladesh. Our team is actively investigating this issue. Message delivery may succeed, but delivery receipts may be delayed. We will provide another update in 1 hour or as soon as more information becomes available.
