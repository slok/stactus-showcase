    - ts: "2026-06-24 18:41:36"
      description: Messaging Service WhatsApp channel sender selection resolves the destination region to the US default for 100% of sends. Messaging Services will always select a US Whatsapp Sender if available or default to any Whatsapp Sender in the Sender Pool. Additionally, all Whatsapp Senders added to a Messaging Service in the past 2 weeks are missing a valid region. We expect to provide another update in 2 hours or as soon as more information becomes available.
