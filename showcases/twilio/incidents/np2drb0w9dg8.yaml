timeline:
    - ts: "2026-06-21 06:28:55"
      description: |-
        Customers using the Legacy Twilio Console are currently unable to re-route phone numbers between the US1, AU1, and IE1 home regions. Customers using the API are unaffected.
        Our engineers have been alerted and are actively investigating. We will provide another update in 1 hour, or as soon as more information becomes available.
      investigating: true
    - ts: "2026-06-21 06:29:40"
      description: We are continuing to investigate this issue.
      investigating: true
    - ts: "2026-06-21 07:35:24"
      description: |-
        Customers using the Legacy Twilio Console are currently unable to re-route phone numbers between the US1, AU1, and IE1 home regions. Customers using the API are unaffected.
        Our engineers have been alerted and are actively investigating. We will provide another update in 2 hours, or as soon as more information becomes available.
      investigating: true
    - ts: "2026-06-21 08:30:39"
      description: |-
        We have identified the cause of the issue affecting phone number routing configuration updates in the Legacy Twilio Console. Customers using the Legacy Twilio Console may be unable to update phone number routing between home regions such as US1, IE1, and AU1, and may receive an error when saving changes.
        The issue is isolated to the Legacy Console workflow. Customers using One Console or the API directly are not impacted and can use those options as a workaround.

        Our engineering team is planning to apply a fix during regular business hours. We will provide another update once implementation begins or as more information becomes available
    - ts: "2026-06-23 01:01:09"
      description: The issue with customers using the Legacy Twilio Console being unable to update phone number routing between home regions such as US1, IE1, and AU1, and receiving an error when saving changes, has been resolved and this Phone Number feature is operating normally at this time.
      resolved: true
