name: USD Charges Are Failing for Customers in Twilio Mexico Cisa Subsidiary
impact: minor
systems:
    - jw9dh2mf4392
timeline:
    - ts: "2026-06-29 20:45:45"
      description: |-
        Some Twilio customers in Mexico may be experiencing issues when attempting to make credit card payments. We have identified the root cause as related to a recent migration of certain existing customers to our Mexico entity, while their account currency remains in USD. This is causing payment processing failures for the impacted accounts. This issue only affects customers whose accounts were migrated to CISA Mexico. Invoiced customers can continue making payments using the bank transfer details provided on their invoice.
        PAYG customers: we are actively working on a resolution. We will provide another update in 1 hour or as soon as more information becomes available.
      investigating: true
