    - ts: "2026-06-03 15:18:16"
      description: Twilio customers may be experiencing SMS delivery receipt delays from a subset of Twilio Long Codes to Liberty Mobile network subscribers in Puerto Rico. Our team is actively investigating this issue. Message delivery may succeed, but delivery receipts may be delayed. We will provide another update in 1 hour or as soon as more information becomes available.
