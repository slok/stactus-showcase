    - ts: "2026-06-03 15:42:57"
      description: Twilio customers may be experiencing SMS delivery receipt delays from a subset of Twilio Short Codes to Liberty Mobile network subscribers in Puerto Rico and network subscribers on multiple networks in the United States. Our team has identified the cause, and is working to resolve the issue. Message delivery may succeed, but delivery receipts may be delayed. We will provide another update in 1 hour or as soon as more information becomes available.
    - ts: "2026-06-03 15:53:50"
