timeline:
    - ts: "2026-07-03 00:11:11"
      description: |-
        We are investigating an issue with one of our upstream providers in ORD. Machines across a subset of hosts may be unreachable or not running correctly. Deploys with machines on these hosts may fail at this time.
        Some Managed Postgres clusters in ORD region may be unavailable at this time.
      investigating: true
    - ts: "2026-07-03 00:29:42"
      description: We've identified and reported power issues with one of our upstream providers in ORD. We're waiting for an update from our upstream for a resolution. Some Managed Postgres clusters in ORD will be unavailable due to placement.
    - ts: "2026-07-03 00:54:03"
      description: Our provider has advised us their facilities team is working on restoring the power, we'll provide another update as soon as we learn more.
    - ts: "2026-07-03 02:59:44"
      description: Power restoration work in a subset of ORD is still in progress and impact remains ongoing for a subset of hosts and some Managed Postgres clusters.
    - ts: "2026-07-03 04:21:06"
      description: Power restoration is ongoing and we're making sure the hosts are healthy before starting customer workloads to avoid issues. Customer impact remains and updates to come.
    - ts: "2026-07-03 04:41:04"
      description: Customer workloads are now starting and we're monitoring the affected hosts. Affected Managed Postgres instances will be investigated.
    - ts: "2026-07-03 05:59:18"
      description: This incident has been resolved.
      resolved: true
