name: Elevated MySQL read-only errors on Cloud databases
impact: minor
systems:
    - 9pd3tysrv4tn
timeline:
    - ts: "2026-07-17 22:10:59"
      description: We are investigating an increase in errors affecting some Cloud databases across multiple regions. Affected applications may intermittently hit read-only errors (MySQL error 1290) on write queries.
      investigating: true
    - ts: "2026-07-17 22:45:04"
      description: We've traced the elevated read-only errors to a planned database migration that briefly placed a subset of Cloud databases into read-only mode. The migration has since completed and the affected databases have recovered and are accepting writes normally again.
