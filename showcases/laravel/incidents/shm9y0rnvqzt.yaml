name: Intermittent errors on select applications in us-east-2 (Ohio)
impact: none
systems: []
timeline:
    - ts: "2025-08-12 20:40:03"
      description: Between 08:30 UTC and 14:30 UTC, some customers in a specific environment in us-east-2 experienced sporadic 502 errors on HTTP requests. The issue was traced to an internal DNS disruption that intermittently prevented resolution for certain application endpoints, affecting only a portion of traffic to those applications. The issue is now resolved, and we are implementing measures to prevent similar occurrences in the future.
      resolved: true
