timeline:
    - ts: "2026-05-22 16:06:22"
      description: |-
        Our edge provider Cloudflare has an API outage effecting the creation of Environments, Custom Domains and Laravel Object Storage (R2 buckets). Existing Environments, Domains and R2 buckets are not effected. Editing Domains and R2 buckets may also fail.

        See https://www.cloudflarestatus.com/incidents/znll7lfnd35h for updates from Cloudflare. We are monitoring the situation.
    - ts: "2026-05-22 16:12:03"
      description: We are continuing to work on a fix for this issue.
    - ts: "2026-05-22 16:35:48"
      description: Cloudflare has reported they have recovered, and we are monitoring our own logs and infrastructure.
    - ts: "2026-05-22 16:55:34"
      description: This incident has been resolved.
      resolved: true
